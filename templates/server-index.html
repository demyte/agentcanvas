<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canvas index</title>
  <style>
    :root {
      --ink: #1d2428;
      --paper: #f5f7f2;
      --panel: #ffffff;
      --line: #d9dfd2;
      --muted: #65736b;
      --accent: #246b63;
      --accent-2: #b75f3b;
      --soft: #e9eee3;
      --shadow: 0 14px 34px rgba(29, 36, 40, 0.10);
      font-family: "Segoe UI", "Aptos", system-ui, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(36, 107, 99, 0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(36, 107, 99, 0.05) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
    }

    .shell {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 5.4rem);
      line-height: 0.9;
      font-weight: 850;
      letter-spacing: 0;
      max-width: 820px;
    }

    .status {
      display: grid;
      gap: 5px;
      justify-items: end;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .status b {
      color: var(--accent);
      font-size: 1rem;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 10px;
      margin: 18px 0;
      align-items: center;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      padding: 10px 12px;
      font: inherit;
      min-height: 42px;
    }

    input:focus-visible, select:focus-visible, a:focus-visible {
      outline: 3px solid rgba(36, 107, 99, 0.25);
      outline-offset: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      display: grid;
      gap: 14px;
      min-height: 190px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 15px;
      text-decoration: none;
      color: inherit;
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(36, 107, 99, 0.45);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    h2 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .badge {
      border: 1px solid rgba(183, 95, 59, 0.35);
      border-radius: 999px;
      color: var(--accent-2);
      background: rgba(183, 95, 59, 0.08);
      padding: 4px 8px;
      font-size: 0.74rem;
      white-space: nowrap;
    }

    .purpose {
      margin: 0;
      color: var(--muted);
      line-height: 1.42;
      font-size: 0.92rem;
    }

    .meta {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 0.78rem;
      align-self: end;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 34px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.55);
    }

    @media (max-width: 700px) {
      .shell { width: min(100% - 18px, 700px); padding-top: 14px; }
      header, .controls { grid-template-columns: 1fr; }
      .status { justify-items: start; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Canvas index</h1>
      </div>
      <div class="status">
        <span>Local server</span>
        <b id="serverUrl">Loading</b>
        <span id="updatedAt"></span>
      </div>
    </header>

    <section class="controls" aria-label="Canvas filters">
      <input id="search" type="search" placeholder="Search canvases by name, purpose, scope, or anchor" autocomplete="off">
      <select id="sort">
        <option value="name">Sort by name</option>
        <option value="modified">Sort by last modified</option>
      </select>
    </section>

    <section id="cards" class="grid" aria-live="polite"></section>
  </main>

  <script>
    const cards = document.getElementById("cards");
    const search = document.getElementById("search");
    const sort = document.getElementById("sort");
    const serverUrl = document.getElementById("serverUrl");
    const updatedAt = document.getElementById("updatedAt");
    let state = { canvases: [] };

    function formatDate(value) {
      if (!value) return "Unknown";
      const date = typeof value === "number" ? new Date(value * 1000) : new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
    }

    function matches(item, query) {
      if (!query) return true;
      const haystack = [item.title, item.id, item.purpose, item.scope, item.anchor, item.lifecycle].join(" ").toLowerCase();
      return haystack.includes(query.toLowerCase());
    }

    function sorted(items) {
      const list = [...items];
      if (sort.value === "modified") {
        return list.sort((a, b) => (b.modified_at || 0) - (a.modified_at || 0));
      }
      return list.sort((a, b) => String(a.title || a.id).localeCompare(String(b.title || b.id)));
    }

    function render() {
      serverUrl.textContent = state.url || window.location.origin;
      updatedAt.textContent = state.updated_at ? `Updated ${formatDate(state.updated_at)}` : "";
      const visible = sorted((state.canvases || []).filter((item) => matches(item, search.value.trim())));
      if (!visible.length) {
        cards.className = "";
        cards.innerHTML = '<div class="empty">No canvases match the current search.</div>';
        return;
      }
      cards.className = "grid";
      cards.innerHTML = "";
      for (const item of visible) {
        const link = document.createElement("a");
        link.className = "card";
        link.href = item.url;
        link.innerHTML = `
          <div class="card-top">
            <h2></h2>
            <span class="badge"></span>
          </div>
          <p class="purpose"></p>
          <div class="meta">
            <span class="modified"></span>
            <span class="path"></span>
          </div>
        `;
        link.querySelector("h2").textContent = item.title || item.id;
        link.querySelector(".badge").textContent = `${item.scope || "canvas"} / ${item.lifecycle || "active"}`;
        link.querySelector(".purpose").textContent = item.purpose || "Working canvas";
        link.querySelector(".modified").textContent = `Last modified ${formatDate(item.modified_at)}`;
        link.querySelector(".path").textContent = item.storage_path || "";
        cards.appendChild(link);
      }
    }

    async function load() {
      const response = await fetch("/server-state.json", { cache: "no-store" });
      state = await response.json();
      render();
    }

    search.addEventListener("input", render);
    sort.addEventListener("change", render);
    load().catch((error) => {
      cards.className = "";
      cards.innerHTML = `<div class="empty">Unable to load server state: ${error.message}</div>`;
    });
  </script>
</body>
</html>
